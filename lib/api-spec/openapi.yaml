openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IndiLingo — Indian regional language learning platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: languages
    description: Language and curriculum
  - name: lessons
    description: Lesson and exercise operations
  - name: users
    description: User profile and progress
  - name: leaderboard
    description: Leaderboard rankings
  - name: exercises
    description: Exercise mistake tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /languages:
    get:
      operationId: listLanguages
      tags: [languages]
      summary: List all available languages
      responses:
        "200":
          description: List of languages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Language"

  /languages/{languageId}/units:
    get:
      operationId: getLanguageUnits
      tags: [languages]
      summary: Get units for a language (no user progress)
      parameters:
        - in: path
          name: languageId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Units without user progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnitWithProgress"
        "404":
          description: Language not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/languages/{languageId}/units:
    get:
      operationId: getUserLanguageUnits
      tags: [users]
      summary: Get units for a language with user progress
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: path
          name: languageId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Units with user progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnitWithProgress"
        "404":
          description: Language or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lessons/{lessonId}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a lesson with its exercises
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson with exercises
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonWithExercises"
        "404":
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lessons/{lessonId}/complete:
    post:
      operationId: completeLesson
      tags: [lessons]
      summary: Mark a lesson as complete (server-authoritative XP/streak/stars)
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonCompleteInput"
      responses:
        "200":
          description: Completion result with updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonCompleteResult"
        "404":
          description: Lesson or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get per-language progress and badge status
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/review:
    get:
      operationId: getReviewQueue
      tags: [users]
      summary: Get spaced-repetition review queue for user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Review queue of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewExercise"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get global leaderboard rankings
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /exercises/{exerciseId}/mistake:
    post:
      operationId: recordMistake
      tags: [exercises]
      summary: Record a wrong answer for spaced repetition
      parameters:
        - in: path
          name: exerciseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MistakeInput"
      responses:
        "200":
          description: Mistake recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /exercises/{exerciseId}/master:
    post:
      operationId: masterExercise
      tags: [exercises]
      summary: Clear an exercise from the review queue (correct on review)
      parameters:
        - in: path
          name: exerciseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MistakeInput"
      responses:
        "200":
          description: Exercise mastered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    Language:
      type: object
      required: [id, name, nativeName, flagEmoji, scriptName, colorHex]
      properties:
        id:
          type: integer
        name:
          type: string
        nativeName:
          type: string
        flagEmoji:
          type: string
        scriptName:
          type: string
        colorHex:
          type: string

    Unit:
      type: object
      required: [id, languageId, title, description, orderIndex, unitType]
      properties:
        id:
          type: integer
        languageId:
          type: integer
        title:
          type: string
        description:
          type: string
        orderIndex:
          type: integer
        unitType:
          type: string
          enum: [script, vocabulary, phrases, conversation]

    LessonSummary:
      type: object
      required: [id, unitId, title, orderIndex, xpReward]
      properties:
        id:
          type: integer
        unitId:
          type: integer
        title:
          type: string
        orderIndex:
          type: integer
        xpReward:
          type: integer
        stars:
          type: ["integer", "null"]
        completed:
          type: boolean

    UnitWithProgress:
      type: object
      required: [id, languageId, title, description, orderIndex, unitType, lessons, completedLessons, totalLessons]
      properties:
        id:
          type: integer
        languageId:
          type: integer
        title:
          type: string
        description:
          type: string
        orderIndex:
          type: integer
        unitType:
          type: string
          enum: [script, vocabulary, phrases, conversation]
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/LessonSummary"
        completedLessons:
          type: integer
        totalLessons:
          type: integer

    Exercise:
      type: object
      required: [id, lessonId, type, question, correctAnswer, options]
      properties:
        id:
          type: integer
        lessonId:
          type: integer
        type:
          type: string
          enum: [script_practice, multiple_choice, translate, fill_blank, match_pairs]
        question:
          type: string
        correctAnswer:
          type: string
        options:
          type: array
          items:
            type: string
        nativeScript:
          type: ["string", "null"]
        romanization:
          type: ["string", "null"]

    LessonWithExercises:
      type: object
      required: [id, unitId, title, orderIndex, xpReward, exercises]
      properties:
        id:
          type: integer
        unitId:
          type: integer
        title:
          type: string
        orderIndex:
          type: integer
        xpReward:
          type: integer
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/Exercise"

    LessonCompleteInput:
      type: object
      required: [userId, correctCount]
      properties:
        userId:
          type: integer
        correctCount:
          type: integer

    LessonCompleteResult:
      type: object
      required: [xpEarned, stars, streakDays, totalXp]
      properties:
        xpEarned:
          type: integer
        stars:
          type: integer
        streakDays:
          type: integer
        totalXp:
          type: integer

    User:
      type: object
      required: [id, name, xp, streak, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        xp:
          type: integer
        streak:
          type: integer
        lastActiveDate:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    LanguageProgress:
      type: object
      required: [languageId, languageName, nativeName, flagEmoji, completedLessons, totalLessons]
      properties:
        languageId:
          type: integer
        languageName:
          type: string
        nativeName:
          type: string
        flagEmoji:
          type: string
        completedLessons:
          type: integer
        totalLessons:
          type: integer

    Badge:
      type: object
      required: [id, name, description, unlocked]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        unlocked:
          type: boolean

    UserStats:
      type: object
      required: [userId, languageProgress, badges]
      properties:
        userId:
          type: integer
        languageProgress:
          type: array
          items:
            $ref: "#/components/schemas/LanguageProgress"
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"

    ReviewExercise:
      type: object
      required: [id, lessonId, type, question, correctAnswer, options, missedCount]
      properties:
        id:
          type: integer
        lessonId:
          type: integer
        type:
          type: string
          enum: [script_practice, multiple_choice, translate, fill_blank, match_pairs]
        question:
          type: string
        correctAnswer:
          type: string
        options:
          type: array
          items:
            type: string
        nativeScript:
          type: ["string", "null"]
        romanization:
          type: ["string", "null"]
        missedCount:
          type: integer

    LeaderboardEntry:
      type: object
      required: [rank, userId, name, xp, streak]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        name:
          type: string
        xp:
          type: integer
        streak:
          type: integer

    MistakeInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
