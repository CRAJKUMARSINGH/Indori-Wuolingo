kind = "web"
previewPath = "/"
title = "IndiLingo"
version = "1.0.0"
id = "artifacts/indori-wuolingo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22310

[services.development]
run = "pnpm --filter @workspace/indori-wuolingo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/indori-wuolingo", "run", "build" ]
publicDir = "artifacts/indori-wuolingo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22310"
BASE_PATH = "/"
