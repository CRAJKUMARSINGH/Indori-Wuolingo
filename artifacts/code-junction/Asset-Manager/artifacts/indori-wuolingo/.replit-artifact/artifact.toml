kind = "mobile"
previewPath = "/"
title = "Indori-Wuolingo"
version = "1.0.0"
id = "artifacts/indori-wuolingo"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20532

[services.development]
run = "pnpm --filter @workspace/indori-wuolingo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/indori-wuolingo", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/indori-wuolingo", "run", "serve" ]

[services.env]
PORT = "20532"
BASE_PATH = "/"
