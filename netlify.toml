[build]
  command   = "pnpm --filter @workspace/indori-wuolingo run build:web"
  publish   = "artifacts/indori-wuolingo/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--version"

# SPA fallback — every route serves index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache immutable Expo static bundles
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
